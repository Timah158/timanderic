type Availability @model @auth(rules: [{allow: public}]) {
  id: ID!
  user: String
  startTime: AWSTime
  endTime: AWSTime
  day: String
}

type Interviews @model @auth(rules: [{allow: public}]) {
  id: ID!
  time: AWSTime
  date: AWSDate
  about: String
  user: String
  email: AWSEmail
  phone: AWSPhone
}

type Projects @model @auth(rules: [{allow: public}]) {
  id: ID!
  Title: String
  Content: String
  createdDate: AWSDate
  modifiedDate: AWSDate
}
 
type Project @model @auth(rules: [{allow: public}]) {
  id: ID!
  title: String!
  content: String!
  createdOn: AWSDate!
  completedOn: AWSDate
  description: String
  img: AWSURL
  createdBy: String!
  hidden: Boolean
}

type Interview @model @auth(rules: [{allow: public}]) {
  id: ID!
  email: AWSEmail!
  phone: AWSPhone!
  date: AWSDate!
  time: AWSTime!
  about: String
  user: String!
}
 
type ProjectContent {
  text: [String!]
  images: [AWSURL]
}

type Project @model @auth(rules: [{allow: public}]) {
  id: ID!
  title: String!
  content: ProjectContent
  createdOn: AWSDate!
  completedOn: AWSDate
  description: String!
  img: AWSURL
  createdBy: String!
  hidden: Boolean!
  status: String
}

type Interview @model @auth(rules: [{allow: public}]) {
  id: ID!
  email: AWSEmail!
  phone: AWSPhone!
  date: AWSDate!
  time: AWSTime!
  about: String
  user: String!
}
 